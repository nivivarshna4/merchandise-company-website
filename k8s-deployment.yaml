apiVersion: v1
kind: Namespace
metadata:
  name: default

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: merchandise-app
  namespace: default
  labels:
    app: merchandise-company-website
spec:
  replicas: 3
  selector:
    matchLabels:
      app: merchandise-company-website
  template:
    metadata:
      labels:
        app: merchandise-company-website
    spec:
      containers:
      - name: merchandise-app
        image: nivivarshna4/merchandise-company-website:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /index.html
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /index.html
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: merchandise-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: merchandise-company-website
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP